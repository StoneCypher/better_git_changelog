# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on: [push]

jobs:

  build:

    strategy:
      matrix:
        include:
          - node-version: 25.x   # fastest, so run first, to error fast
            os: ubuntu-latest
          - node-version: 25.x   # slowest, so run next. sort by slowest from here to get earliest end through parallelism
            os: macos-latest
          - node-version: 25.x   # finish check big-3 on latest current
            os: windows-latest
          - node-version: 24.x   # then stable
            os: ubuntu-latest
          - node-version: 24.x
            os: macos-latest
          - node-version: 24.x
            os: windows-latest
          - node-version: 20.x  # lastly check just ubuntu on historic node versions because speed, oldest (slowest) first
            os: ubuntu-latest
          - node-version: 21.x
            os: ubuntu-latest
          - node-version: 22.x
            os: ubuntu-latest
          - node-version: 23.x
            os: ubuntu-latest

    runs-on: ${{matrix.os}}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install attw (type-correctness checker)
      run: npm install -g @arethetypeswrong/cli@0.18.2
    - name: npm install, build, and test
      run: |
        npm install && npm run build
      env:
        CI: true

  release:
    if: (github.event.pusher.name == github.event.repository.owner.name) && (github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write     # required for npm trusted publishing (OIDC)
      contents: write     # the job pushes tags and creates a release

    steps:
    - uses: actions/checkout@v4

    - name: Export tag to envvars
      run: |
        export TAG=$(awk -F'"' '/"version": ".+"/{ print $4; exit; }' package.json)
        echo "TAG=$TAG" >> $GITHUB_ENV

    - name: Determine whether this version is already released
      id: release_state
      run: |
        if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
          echo "Version $TAG is already released; release and publish will be skipped."
          echo "new_version=false" >> "$GITHUB_OUTPUT"
        else
          echo "new_version=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        registry-url: https://registry.npmjs.org/

    - name: Install dependencies and attw
      if: steps.release_state.outputs.new_version == 'true'
      run: |
        npm install
        npm install -g @arethetypeswrong/cli@0.18.2

    - name: Build (generate type declarations and changelog)
      if: steps.release_state.outputs.new_version == 'true'
      run: npm run build

    - name: Push tags
      if: steps.release_state.outputs.new_version == 'true'
      run: git push origin --tags

    - name: Create the release
      if: steps.release_state.outputs.new_version == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.TAG }}
        release_name: ${{ env.TAG }}
        body_path: CHANGELOG.md

    - name: Upgrade npm to a version that supports trusted publishing
      if: steps.release_state.outputs.new_version == 'true'
      run: npm install -g npm@latest

    - name: Publish to npm
      if: steps.release_state.outputs.new_version == 'true'
      run: npm publish
